<!-- templates/supplier_login.html - ИСПРАВЛЕННАЯ ВЕРСИЯ -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход поставщика | Sarqyn GO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-page {
            width: 100%;
            max-width: 440px;
        }

        .login-container {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        .login-header {
            background: #367666;
            padding: 40px 30px;
            text-align: center;
        }

        .login-logo-text {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            color: white;
        }

        .login-logo-text .go {
            color: #FFD700;
        }

        .login-subtitle {
            font-size: 14px;
            color: #d4edda;
            margin-top: 8px;
        }

        .login-body {
            padding: 40px 35px;
            background: white;
        }

        h2 {
            color: #367666;
            text-align: center;
            margin-bottom: 32px;
            font-size: 24px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #367666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #367666;
            box-shadow: 0 0 0 4px rgba(54, 118, 102, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #367666;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #2a5a4d;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(54, 118, 102, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
            border-left: 4px solid #dc2626;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #64748b;
        }

        .register-link a {
            color: #367666;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: #2a5a4d;
        }

        .info-box {
            margin-top: 32px;
            padding: 20px;
            background: #f0fdf4;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #bbf7d0;
        }

        .info-box p {
            font-size: 13px;
            color: #367666;
            line-height: 1.6;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo-text">
                Sarqyn <span class="go">GO</span>
            </div>
            <div class="login-subtitle">Платформа для поставщиков</div>
        </div>

        <div class="login-body">
            <h2>Вход в кабинет</h2>

            <div id="errorMsg" class="error-msg"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required autofocus placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button id="loginBtn" class="btn-login">
                Войти
            </button>

            <div class="register-link">
                <a href="/supplier/register">
                    Новый магазин? Зарегистрироваться
                </a>
            </div>

            <div class="info-box">
                <p>
                    💡 После регистрации вы сможете:<br>
                    ✓ Добавлять сюрпризы<br>
                    ✓ Управлять заказами<br>
                    ✓ Видеть статистику
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // ============================================================
    // ПРОВЕРКА ТОКЕНА ПРИ ЗАГРУЗКЕ
    // ============================================================
    (function() {
        const token = sessionStorage.getItem('supplier_token');
        if (token) {
            console.log('🔑 Токен найден, автоматический переход...');
            window.location.replace('/supplier/dashboard?token=' + encodeURIComponent(token));
        }
    })();

    async function doLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showError('Заполните email и пароль');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loader"></span> Вход...';
        errorMsg.classList.remove('show');

        try {
            const response = await fetch('/supplier/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();
            console.log('📥 Ответ:', data);

            if (data.success && data.token) {
                sessionStorage.setItem('supplier_token', data.token);
                localStorage.setItem('supplier_token', data.token);
                
                if (data.supplier) {
                    sessionStorage.setItem('supplier', JSON.stringify(data.supplier));
                }
                
                window.location.replace('/supplier/dashboard?token=' + encodeURIComponent(data.token));
            } else {
                showError(data.message || data.error || 'Неверный email или пароль');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Войти';
            }
        } catch (error) {
            console.error('❌ Ошибка:', error);
            showError('Ошибка сети. Попробуйте снова');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Войти';
        }
    }

    function showError(message) {
        errorMsg.textContent = '❌ ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 5000);
    }

    loginBtn.addEventListener('click', doLogin);
    
    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            doLogin();
        }
    });

    console.log('🚀 Страница логина загружена');
</script>
</body>
</html>
