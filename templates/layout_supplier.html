<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarqyt GO - Панель поставщика</title>
    <link rel="icon" type="image/png" href="{{ url_for('static/images', filename='icon.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Navbar */
        .navbar {
            background: #0f172a;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo img {
            width: 32px;
            height: 32px;
            -webkit-text-fill-color: initial;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .nav-links a:hover {
            color: #fbbf24;
        }
        
        .lang-switch {
            display: flex;
            gap: 0.5rem;
        }
        
        .lang-btn {
            background: transparent;
            border: 1px solid #334155;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn:hover {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static/images', filename='icon.png') }}" alt="Icon">
            Sarqyt GO
        </div>
        <div class="nav-links">
            <a href="/supplier/dashboard">📊 Дашборд</a>
            <a href="/supplier/orders">📋 Заказы</a>
            <a href="/supplier/bags">🎁 Сюрпризы</a>
            <div class="lang-switch">
                <button class="lang-btn" onclick="switchLang('ru')">РУС</button>
                <button class="lang-btn" onclick="switchLang('kz')">ҚАЗ</button>
            </div>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <script>
        function switchLang(lang) {
            var url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }
    </script>
</body>
</html>
