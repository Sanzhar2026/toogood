<!-- supplier_bags_table.html -->
<div class="bags-section">
    <div class="section-header">
        <span class="section-title" id="titleBags">Surprise Bags</span>
        <div style="display: flex; gap: 0.5rem;">
            <button class="refresh-btn" id="toggleAddBagBtn"><span id="btnAdd">Add Surprise</span></button>
            <button class="clear-btn" id="clearInactiveBagsBtn"><span id="btnClearInactive">Clear Inactive</span></button>
            <button class="clear-btn" id="clearAllBagsBtn" style="background: #dc2626;"><span id="btnDeleteAll">Delete All</span></button>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th id="thBagName">Name</th>
                    <th id="thBagDesc">Description</th>
                    <th id="thBagPrice">Price</th>
                    <th id="thBagDiscounted">Discounted</th>
                    <th id="thBagDiscount">Discount</th>
                    <th id="thBagQty">Quantity</th>
                    <th id="thBagType">Type</th>
                    <th id="thBagStatus">Status</th>
                    <th id="thBagAction">Action</th>
                </tr>
            </thead>
            <tbody id="bagsTableBody"></tbody>
        </table>
    </div>
</div>
