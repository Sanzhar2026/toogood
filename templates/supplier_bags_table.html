<div class="bags-section">
    <div class="section-header">
        <span class="section-title" id="titleBags">Сюрпризы</span>
        <div style="display: flex; gap: 0.5rem;">
            <button class="refresh-btn" id="toggleAddBagBtn"><span id="btnAdd">Добавить</span></button>
            <button class="clear-btn" id="clearInactiveBagsBtn"><span id="btnClearInactive">Удалить неактивные</span></button>
            <button class="clear-btn" id="clearAllBagsBtn" style="background: #dc2626;"><span id="btnDeleteAll">Удалить все</span></button>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th id="thBagName">Название</th>
                    <th id="thBagDesc">Описание</th>
                    <th id="thBagPrice">Цена</th>
                    <th id="thBagDiscounted">Со скидкой</th>
                    <th id="thBagDiscount">Скидка</th>
                    <th id="thBagQty">Кол-во</th>
                    <th id="thBagType">Тип</th>
                    <th id="thBagStatus">Статус</th>
                    <th id="thBagAction">Действие</th>
                </tr>
            </thead>
            <tbody id="bagsTableBody"></tbody>
        </table>
    </div>
</div>
