<div class="business-info">
    <h1>{{ supplier.business_name }}</h1>
    <p id="locationText">{{ supplier.address or 'Адрес не указан' }} | {{ supplier.phone or '—' }}</p>
</div>
<div class="header-actions">
    <span class="rating-badge" id="ratingText">⭐ {{ supplier.rating or 0 }}</span>
    <div class="lang-selector">
        <button class="lang-btn" data-lang="kz">Қаз</button>
        <button class="lang-btn" data-lang="ru">Рус</button>
        <button class="lang-btn active" data-lang="en">En</button>
    </div>
    <button onclick="logout()" class="logout-btn">Выйти</button>
</div>
