<!-- supplier_orders_table.html -->
<div class="orders-section">
    <div class="section-header">
        <div>
            <span class="section-title" id="titleActiveOrders">Active Orders</span>
            <span class="live-badge">LIVE</span>
        </div>
        <button class="refresh-btn" id="refreshOrdersBtn"><span id="btnRefresh">Refresh</span></button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th id="thOrder">Order #</th>
                    <th id="thCustomer">Customer / Address</th>
                    <th id="thProduct">Product</th>
                    <th id="thAmount">Amount</th>
                    <th id="thStatus">Status</th>
                    <th id="thCourier">Courier</th>
                    <th id="thAction">Action</th>
                    <th id="thMap">Map</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
        </table>
    </div>
</div>
