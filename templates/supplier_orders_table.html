<!-- templates/supplier_orders_table.html -->
<div class="orders-section">
    <div class="section-header">
        <div>
            <span class="section-title" id="titleActiveOrders">Активные заказы</span>
            <span class="live-badge">LIVE</span>
        </div>
        <button class="refresh-btn" id="refreshOrdersBtn"><span id="btnRefresh">Обновить</span></button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th id="thOrder">Заказ #</th>
                    <th id="thCustomer">Клиент / Адрес</th>
                    <th id="thProduct">Товар</th>
                    <th id="thAmount">Сумма</th>
                    <th id="thStatus">Статус</th>
                    <th id="thCourier">Курьер</th>
                    <th id="thAction">Действие</th>
                    <th id="thMap">Карта</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
        </table>
    </div>
</div>
