<!-- templates/supplier_data.html -->
<div id="supplierData" 
     data-supplier-id="{{ supplier.id }}" 
     data-token="{{ token or '' }}" 
     data-address="{{ supplier.address or '' }}"
     data-phone="{{ supplier.phone or '' }}"
     data-rating="{{ supplier.rating or 0 }}"
     data-business-type="{{ supplier.business_type or 'restaurant' }}"
     data-products='{{ products|tojson|safe }}'
     data-templates='{{ templates_data|tojson|safe }}'
     style="display: none;">
</div>

<script>
(function() {
    console.log('🚀 Загрузка supplier_data...');
    
    // ======== 1. ПОЛУЧАЕМ ТОКЕН ИЗ URL ========
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    
    if (tokenFromUrl) {
        sessionStorage.setItem('supplier_token', tokenFromUrl);
        localStorage.setItem('supplier_token', tokenFromUrl);
        console.log('✅ Токен сохранен из URL в supplier_token');
    }
    
    const el = document.getElementById('supplierData');
    if (!el) {
        console.error('❌ supplierData элемент не найден!');
        return;
    }
    
    // ======== 2. ЗАГРУЖАЕМ ДАННЫЕ ========
    const tokenFromData = el.dataset.token || '';
    const supplierId = parseInt(el.dataset.supplierId);
    
    console.log('📄 Токен из data-token:', tokenFromData ? tokenFromData.substring(0, 30) + '...' : '❌ НЕТ');
    console.log('📄 Supplier ID:', supplierId);
    
    // ======== 3. СОХРАНЯЕМ ТОКЕН В supplier_token ========
    if (tokenFromData && tokenFromData !== 'None' && tokenFromData !== '') {
        sessionStorage.setItem('supplier_token', tokenFromData);
        localStorage.setItem('supplier_token', tokenFromData);
        console.log('✅ Токен сохранен из data-token в supplier_token');
    }
    
    // ======== 4. ПРОВЕРЯЕМ ЧТО ТОКЕН ЕСТЬ ========
    const finalToken = sessionStorage.getItem('supplier_token');
    if (!finalToken) {
        console.warn('⚠️ НЕТ ТОКЕНА!');
    } else {
        console.log('🔑 ИТОГОВЫЙ ТОКЕН:', finalToken.substring(0, 30) + '...');
    }
    
    // ======== 5. ЗАГРУЖАЕМ ПРОДУКТЫ (БЕЗ icon И name_en) ========
    try {
        window.productsData = JSON.parse(el.dataset.products || '[]');
    } catch(e) {
        window.productsData = [];
    }
    
    // ======== 6. ЗАГРУЖАЕМ ШАБЛОНЫ ========
    try {
        window.templatesData = JSON.parse(el.dataset.templates || '{"templates":{}}');
    } catch(e) {
        window.templatesData = { templates: {} };
    }
    
    // ======== 7. СОЗДАЕМ WINDOW.SUPPLIERDATA ========
    window.supplierData = {
        id: supplierId,
        token: finalToken || tokenFromData || '',
        address: el.dataset.address || '',
        phone: el.dataset.phone || '',
        rating: parseFloat(el.dataset.rating) || 0,
        businessType: el.dataset.businessType || 'restaurant'
    };
    
    // ======== 8. ТЕСТОВЫЕ ДАННЫЕ (БЕЗ icon И name_en) ========
    if (!window.productsData || window.productsData.length === 0) {
        console.warn('⚠️ Нет продуктов, создаем тестовые');
        window.productsData = [
            {id: 1, name_ru: 'Маргарита Пицца', name_kz: 'Маргарита Пицца', price: 2500},
            {id: 2, name_ru: 'Пепперони Пицца', name_kz: 'Пепперони Пицца', price: 3200},
            {id: 6, name_ru: 'Гамбургер', name_kz: 'Гамбургер', price: 1800},
            {id: 14, name_ru: 'Кока-Кола', name_kz: 'Кока-Кола', price: 500},
            {id: 16, name_ru: 'Чизкейк', name_kz: 'Чизкейк', price: 1200},
            {id: 18, name_ru: 'Картошка Фри', name_kz: 'Картоп Фри', price: 800}
        ];
    }
    
    // ======== 9. ТЕСТОВЫЕ ШАБЛОНЫ ========
    if (!window.templatesData || !window.templatesData.templates || Object.keys(window.templatesData.templates).length === 0) {
        console.warn('⚠️ Нет шаблонов, создаем тестовые');
        window.templatesData = {
            icon: '🎁',
            name: {'en': 'Restaurant', 'ru': 'Ресторан', 'kz': 'Ресторан'},
            templates: {
                'dinner_set': {
                    name: {'en': 'Dinner Set', 'ru': 'Ужин на двоих', 'kz': 'Кешкі ас'},
                    items: [{'id': 1, 'qty': 2}, {'id': 14, 'qty': 2}],
                    price: 5500,
                    description: {'en': 'Romantic dinner', 'ru': 'Романтический ужин', 'kz': 'Романтикалық кешкі ас'}
                },
                'family_set': {
                    name: {'en': 'Family Set', 'ru': 'Семейный обед', 'kz': 'Отбасылық түскі ас'},
                    items: [{'id': 2, 'qty': 2}, {'id': 18, 'qty': 2}],
                    price: 7200,
                    description: {'en': 'Family lunch', 'ru': 'Семейный обед', 'kz': 'Отбасылық түскі ас'}
                }
            }
        };
    }
    
    console.log('✅ Supplier Data загружено!');
    console.log('📦 Products:', window.productsData?.length || 0);
    console.log('📋 Templates:', Object.keys(window.templatesData?.templates || {}).length);
    console.log('🔑 Token:', window.supplierData.token ? window.supplierData.token.substring(0, 30) + '...' : '❌ НЕТ');
    console.log('🆔 Supplier ID:', window.supplierData.id);
})();
</script>
