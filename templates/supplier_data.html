<script>
// ======== ПОЛУЧАЕМ ТОКЕН ИЗ URL ========
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    
    if (tokenFromUrl) {
        sessionStorage.setItem('supplier_token', tokenFromUrl);
        localStorage.setItem('supplier_token', tokenFromUrl);
        console.log('✅ Токен сохранен из URL');
    }
    
    const token = sessionStorage.getItem('supplier_token');
    if (!token) {
        console.warn('⚠️ Нет токена в sessionStorage');
    } else {
        console.log('🔑 Токен есть:', token.substring(0, 30) + '...');
    }
})();

// ======== authFetch - ГЛАВНАЯ ФУНКЦИЯ ========
async function authFetch(url, options = {}) {
    // ======== БЕРЕМ ТОКЕН ИЗ SESSIONSTORAGE ========
    let token = sessionStorage.getItem('supplier_token');
    
    // Если нет в sessionStorage - пробуем из localStorage
    if (!token) {
        token = localStorage.getItem('supplier_token');
    }
    
    // Если все еще нет - пробуем из window.supplierData
    if (!token && window.supplierData) {
        token = window.supplierData.token;
    }
    
    // Если совсем нет - редирект
    if (!token) {
        console.error('❌ НЕТ ТОКЕНА! Редирект на логин...');
        window.location.href = '/supplier/login';
        throw new Error('No token');
    }
    
    console.log('🔑 Отправка запроса к', url, 'с токеном:', token.substring(0, 30) + '...');
    
    try {
        const response = await fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token,
                ...options.headers
            }
        });
        
        if (response.status === 401) {
            console.error('❌ 401 Unauthorized - токен не валидный!');
            sessionStorage.removeItem('supplier_token');
            localStorage.removeItem('supplier_token');
            window.location.href = '/supplier/login';
            throw new Error('Unauthorized');
        }
        
        return response;
    } catch(error) {
        console.error('❌ Ошибка запроса:', error);
        throw error;
    }
}

let supplierId = parseInt(document.getElementById('supplierData').getAttribute('data-supplier-id'));
let tokenFromHtml = document.getElementById('supplierData').getAttribute('data-token');

function getSupplierToken() {
    let token = sessionStorage.getItem('supplier_token');
    if (!token && tokenFromHtml && tokenFromHtml !== '' && tokenFromHtml !== 'None') {
        token = tokenFromHtml;
        sessionStorage.setItem('supplier_token', token);
    }
    return token;
}

function clearSupplierToken() { 
    sessionStorage.removeItem('supplier_token');
    localStorage.removeItem('supplier_token');
}

function logout() { 
    clearSupplierToken(); 
    window.location.href = '/supplier/login'; 
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.innerHTML = (type === 'success' ? '✓' : '⚠') + ' ' + message;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}

function escapeHtml(str) { 
    if (!str) return ''; 
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
}

function getImageByTitle(title) {
    const lowerTitle = title.toLowerCase();
    if (lowerTitle.includes('пицц') || lowerTitle.includes('pizza')) return 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600&h=400&fit=crop';

document.addEventListener('DOMContentLoaded', function() {
    console.log('🚀 Загрузка дашборда...');
    
    const savedLang = localStorage.getItem('supplier_lang') || 'ru';
    setLanguage(savedLang);
    
    initData();
    refreshOrders();
    refreshBags();
    initWebSocket();
    
    document.getElementById('refreshOrdersBtn').addEventListener('click', refreshOrders);
    document.getElementById('toggleAddBagBtn').addEventListener('click', function() {
        const form = document.getElementById('addBagForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('clearInactiveBagsBtn').addEventListener('click', clearInactiveBags);
    document.getElementById('clearAllBagsBtn').addEventListener('click', clearAllBags);
    document.getElementById('addProductBtn').addEventListener('click', addProduct);
    
    document.querySelectorAll('.discount-preset').forEach(btn => {
        btn.addEventListener('click', function() {
            applyDiscount(parseInt(this.dataset.percent));
        });
    });
    
    document.getElementById('surpriseTemplate').addEventListener('change', loadSurpriseTemplate);
    
    document.getElementById('createBagForm').addEventListener('submit', function(e) {
        e.preventDefault();
        submitBagForm();
    });
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            setLanguage(this.dataset.lang);
        });
    });
    
    setInterval(() => {
        refreshOrders();
        refreshBags();
    }, 30000);
    
    console.log('✅ Дашборд загружен!');
});
