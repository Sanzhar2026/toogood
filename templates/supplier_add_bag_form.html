<!-- templates/supplier_add_bag_form.html -->
<div class="add-bag-form" id="addBagForm" style="display: none;">
    <h3 id="formTitle" style="margin-bottom: 1rem; font-size: 1rem;">Добавить сюрприз</h3>
    <form id="createBagForm">
        <div class="form-group full-width">
            <label id="labelTemplate">Готовый сюрприз</label>
            <select id="surpriseTemplate">
                <option value="">-- Выберите готовый сюрприз --</option>
            </select>
            <small id="selectedHint" style="color: #64748b;">Выберите готовый сюрприз для автозаполнения</small>
        </div>

        <div class="form-group full-width">
            <label id="labelName">Название сюрприза *</label>
            <input type="text" id="bagName" required>
        </div>

        <div class="form-group full-width">
            <label id="labelDesc">Описание</label>
            <textarea id="bagDescription" rows="2"></textarea>
        </div>

        <div class="form-group full-width">
            <label id="labelProducts">Список товаров</label>
            <div class="product-row">
                <select id="productSelect">
                    <option value="">-- Выберите товар --</option>
                </select>
                <input type="number" id="productQuantity" class="quantity-input" value="1" min="1">
                <button type="button" class="btn-primary" id="addProductBtn">+ Добавить</button>
            </div>
            <div id="selectedProductsPreview" style="display: none;">
                <strong id="selectedTitle">Выбранные товары:</strong>
                <div id="selectedProductsList" class="selected-products-list"></div>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label id="labelOriginalPrice">Оригинальная цена (₸)</label>
                <input type="number" id="originalPrice" readonly style="background: #f1f5f9;">
            </div>
            <div class="form-group">
                <label id="labelDiscount">Скидка</label>
                <div class="discount-buttons">
                    <button type="button" class="discount-preset" data-percent="30">-30%</button>
                    <button type="button" class="discount-preset" data-percent="40">-40%</button>
                    <button type="button" class="discount-preset" data-percent="50">-50%</button>
                    <button type="button" class="discount-preset" data-percent="75">-75%</button>
                    <button type="button" class="discount-preset" data-percent="0">Без скидки</button>
                </div>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label id="labelDiscountedPrice">Цена со скидкой (₸)</label>
                <input type="number" id="discountedPrice" required>
                <div id="discountInfo" style="font-size: 0.7rem; color: #10b981;"></div>
            </div>
            <div class="form-group">
                <label id="labelQuantity">Количество</label>
                <input type="number" id="availableQuantity" value="5" min="1">
            </div>
            <div class="form-group">
                <label id="labelPickupStart">Время выдачи (начало)</label>
                <input type="text" id="pickupStart" placeholder="19:30">
            </div>
            <div class="form-group">
                <label id="labelPickupEnd">Время выдачи (конец)</label>
                <input type="text" id="pickupEnd" placeholder="20:00">
            </div>
        </div>

        <div class="form-group full-width">
            <label id="labelBagType">📦 Тип сюрприза</label>
            <div style="display: flex; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.5rem 1rem; background: #f1f5f9; border-radius: 0.5rem;">
                    <input type="radio" name="bag_type" value="visible" checked onchange="toggleBagTypeFields()">
                    <span>🔓 Открытый</span>
                    <small style="color: #64748b;">Клиент видит состав</small>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.5rem 1rem; background: #f1f5f9; border-radius: 0.5rem;">
                    <input type="radio" name="bag_type" value="hidden" onchange="toggleBagTypeFields()">
                    <span>🔒 Скрытый</span>
                    <small style="color: #64748b;">Клиент НЕ видит состав</small>
                </label>
            </div>
            <div id="hiddenHint" style="display: none; margin-top: 0.5rem; padding: 0.5rem; background: #fef3c7; border-radius: 0.5rem; font-size: 0.7rem; color: #92400e;">
                🎁 Скрытый режим: клиент увидит только название и цену. Состав будет секретом до получения заказа.
            </div>
        </div>

        <div class="form-group full-width">
            <label id="labelImage">URL изображения</label>
            <input type="text" id="imageUrl" placeholder="Автозаполняется из шаблона или по названию">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Добавить сюрприз</button>
    </form>
</div>
