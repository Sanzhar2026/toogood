{% extends "layout_supplier.html" %}

{% block content %}
<style>
    .landing {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
        padding: 2rem;
    }
    
    .landing h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #0f172a 0%, #fbbf24 100%);
    
        -webkit-text-fill-color: transparent;
    }
    
    .landing p {
        color: #64748b;
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }
    
    .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    
    .btn-large {
        padding: 0.8rem 2rem;
        font-size: 1rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s;
    }
    
    .btn-primary {
        background: #fbbf24;
        color: #0f172a;
    }
    
    .btn-primary:hover {
        background: #f59e0b;
        transform: translateY(-2px);
    }
    
    .btn-secondary {
        background: #0f172a;
        color: white;
    }
    
    .btn-secondary:hover {
        background: #1e293b;
        transform: translateY(-2px);
    }
</style>

<div class="landing">
    <h1>🏪 Sarqyt GO</h1>
    <p>Панель управления для поставщиков</p>
    <div class="buttons">
        <a href="/supplier/login" class="btn-large btn-primary">🔑 Войти</a>
        <a href="/supplier/register" class="btn-large btn-secondary">📝 Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
