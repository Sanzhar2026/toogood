{% extends "supplier_base.html" %}

{% block title %}Заказы - {{ supplier.business_name }}{% endblock %}

{% block extra_head %}
<style>
.orders-container { padding: 1rem 2rem 5rem 2rem; }
.nav-links { background: white; border-bottom: 1px solid #e8f5e9; padding: 0 2rem; margin-bottom: 2rem; display: flex; gap: 2rem; overflow-x: auto; position: sticky; top: 70px; z-index: 99; }
.nav-links a { padding: 1rem 0; text-decoration: none; color: #64748b; font-weight: 500; transition: all 0.2s; font-size: 0.9rem; }
.nav-links a:hover { color: #367666; }
.nav-links a.active { color: #367666; border-bottom: 2px solid #367666; }
.section-title { font-size: 1.2rem; font-weight: 600; color: #367666; border-left: 4px solid #367666; padding-left: 0.75rem; }
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th, td { padding: 0.6rem 0.5rem; text-align: left; border-bottom: 1px solid #e8f5e9; }
th { background: #f8faf8; font-weight: 600; color: #367666; border-bottom: 2px solid #367666; }
.status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; }
.status-pending { background: #fef3c7; color: #92400e; }
.status-confirmed { background: #dbeafe; color: #1e40af; }
.status-preparing { background: #e0e7ff; color: #3730a3; }
.status-ready_for_pickup { background: #d1fae5; color: #065f46; }
.status-out_for_delivery { background: #fed7aa; color: #9a3412; }
.status-delivered { background: #d1fae5; color: #065f46; }
.status-cancelled { background: #fee2e2; color: #991b1b; }
.header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.refresh-btn { background: #f1f5f9; border: 1px solid #e0e0e0; padding: 0.4rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.8rem; color: #367666; transition: background 0.2s; }
.refresh-btn:hover { background: #e8f5e9; }
</style>
{% endblock %}

{% block content %}
<div class="orders-container">
    <div class="nav-links">
        <a href="/supplier/dashboard">Главная</a>
        <a href="/supplier/couriers">Курьеры</a>
        <a href="/supplier/orders" class="active">Заказы</a>
        <a href="/supplier/surprise-bags">Сюрпризы</a>
    </div>

    <div class="header-actions">
        <h1 class="section-title">Все заказы</h1>
        <button class="refresh-btn" onclick="location.reload()">Обновить</button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Заказ #</th>
                    <th>Клиент</th>
                    <th>Телефон</th>
                    <th>Сумма</th>
                    <th>Статус</th>
                    <th>Курьер</th>
                    <th>Дата</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" style="text-align: center; padding: 2rem; color: #94a3b8;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const token = sessionStorage.getItem('supplier_token');
    
    fetch('/api/supplier/orders', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('ordersTableBody');
        if (!data.orders || data.orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem; color: #94a3b8;">Нет заказов</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        data.orders.forEach(o => {
            const statusText = {
                pending: 'Ожидает', confirmed: 'Подтвержден', preparing: 'Готовится',
                ready_for_pickup: 'Готов', out_for_delivery: 'В пути',
                delivered: 'Доставлен', cancelled: 'Отменен'
            }[o.status] || o.status;
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${o.order_number}</strong></td>
                    <td>${o.customer_name || '—'}</td>
                    <td>${o.customer_phone || '—'}</td>
                    <td><strong>${o.amount_paid} ₸</strong></td>
                    <td><span class="status-badge status-${o.status}">${statusText}</span></td>
                    <td>${o.assigned_courier_name || '—'}</td>
                    <td>${new Date(o.created_at).toLocaleString()}</td>
                </tr>
            `;
        });
    })
    .catch(() => {
        document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem; color: #e74c3c;">Ошибка загрузки</td></tr>';
    });
});
</script>
{% endblock %}
