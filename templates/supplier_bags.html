{% extends "supplier_base.html" %}

{% block title %}Сюрпризы - {{ supplier.business_name }}{% endblock %}

{% block extra_head %}
<style>
.bags-container { padding: 1rem 2rem 5rem 2rem; }
.nav-links { background: white; border-bottom: 1px solid #e8f5e9; padding: 0 2rem; margin-bottom: 2rem; display: flex; gap: 2rem; overflow-x: auto; position: sticky; top: 70px; z-index: 99; }
.nav-links a { padding: 1rem 0; text-decoration: none; color: #64748b; font-weight: 500; transition: all 0.2s; font-size: 0.9rem; }
.nav-links a:hover { color: #367666; }
.nav-links a.active { color: #367666; border-bottom: 2px solid #367666; }
.section-title { font-size: 1.2rem; font-weight: 600; color: #367666; border-left: 4px solid #367666; padding-left: 0.75rem; }
.header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.btn-primary { background: #367666; color: white; padding: 0.4rem 0.8rem; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-primary:hover { background: #2a5a4d; }
.refresh-btn { background: #f1f5f9; border: 1px solid #e0e0e0; padding: 0.4rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.8rem; color: #367666; transition: background 0.2s; }
.refresh-btn:hover { background: #e8f5e9; }
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th, td { padding: 0.6rem 0.5rem; text-align: left; border-bottom: 1px solid #e8f5e9; }
th { background: #f8faf8; font-weight: 600; color: #367666; border-bottom: 2px solid #367666; }
</style>
{% endblock %}

{% block content %}
<div class="bags-container">
    <div class="nav-links">
        <a href="/supplier/dashboard">Главная</a>
        <a href="/supplier/couriers">Курьеры</a>
        <a href="/supplier/orders">Заказы</a>
        <a href="/supplier/surprise-bags" class="active">Сюрпризы</a>
    </div>

    <div class="header-actions">
        <h1 class="section-title">Сюрпризы</h1>
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn-primary" onclick="window.location.href='/supplier/dashboard?openForm=bag'">+ Добавить</button>
            <button class="refresh-btn" onclick="location.reload()">Обновить</button>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Цена</th>
                    <th>Со скидкой</th>
                    <th>Кол-во</th>
                    <th>Тип</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody id="bagsTableBody">
                <tr><td colspan="6" style="text-align: center; padding: 2rem; color: #94a3b8;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const token = sessionStorage.getItem('supplier_token');
    
    fetch('/api/supplier/surprise-bags', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('bagsTableBody');
        if (!data.bags || data.bags.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: #94a3b8;">Нет сюрпризов</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        data.bags.forEach(b => {
            const typeText = b.hide_contents ? 'Скрытый' : 'Открытый';
            const typeColor = b.hide_contents ? '#f59e0b' : '#10b981';
            const statusText = b.is_active ? 'Активен' : 'Неактивен';
            const statusColor = b.is_active ? '#10b981' : '#e74c3c';
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${b.name}</strong></td>
                    <td>${b.original_price} ₸</td>
                    <td><strong style="color: #e74c3c;">${b.discounted_price} ₸</strong></td>
                    <td>${b.available_quantity}/${b.total_quantity}</td>
                    <td style="color: ${typeColor}; font-weight: bold;">${typeText}</td>
                    <td style="color: ${statusColor};">${statusText}</td>
                </tr>
            `;
        });
    })
    .catch(() => {
        document.getElementById('bagsTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: #e74c3c;">Ошибка загрузки</td></tr>';
    });
});
</script>
{% endblock %}
